<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オンライン診療（快活クラブご利用者向け）</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .service-label {
      font-size: 12px;
      color: #007bff;
      font-weight: bold;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.4;
      color: #1f2d3d;
    }

    .lead {
      margin: 14px 0 0;
      font-size: 14px;
      line-height: 1.7;
      color: #5f6b7a;
    }

    .context {
      margin-top: 18px;
      padding: 14px 16px;
      background: #f0f6ff;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.7;
      color: #355070;
      text-align: left;
    }

    .status-box {
      margin-top: 22px;
      background: #f8fbff;
      border: 1px solid #d9e8ff;
      border-radius: 14px;
      padding: 20px 16px;
    }

    .status-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .time {
      font-size: 42px;
      font-weight: bold;
      color: #007bff;
      line-height: 1.2;
      margin: 0;
    }

    .people {
      margin-top: 10px;
      font-size: 16px;
      color: #374151;
    }

    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 22px;
      padding: 15px 16px;
      font-size: 18px;
      font-weight: bold;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
    }

    .room-box {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #e5e7eb;
    }

    .room-text {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .room-link {
      font-size: 14px;
      font-weight: bold;
      color: #007bff;
      text-decoration: none;
    }

    .notes {
      margin-top: 20px;
      font-size: 12px;
      line-height: 1.7;
      color: #6b7280;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="service-label">ONLINE MEDICAL SERVICE</div>

      <h1>オンライン診療<br>（快活クラブご利用者向け）</h1>

      <p class="lead">
        快活クラブのご利用をきっかけに、ご自宅からもオンライン診療をご利用いただけます。
      </p>

      <div class="context">
        このサービスは、快活クラブの店舗利用をきっかけとして提供されるオンライン診療導線のデモです。
      </div>

      <div class="status-box">
        <div class="status-label">現在の待ち時間</div>
        <div class="time">
          <span id="minutes">15</span>:<span id="seconds">00</span>
        </div>
        <div class="people">あと <span id="people">3</span> 人待ち</div>
      </div>

      <a class="btn" href="/start">受付する</a>

      <div class="room-box">
        <div class="room-text">
          快活クラブ個室から利用する場合はこちら
        </div>
        <a class="room-link" href="/">個室向けページへ</a>
      </div>

      <div class="notes">
        ※ 診療開始時間は目安です。<br>
        ※ 混雑状況や診療内容により前後する場合があります。<br>
        ※ 本サービスは実証実験用デモです。
      </div>
    </div>
  </div>

  <script>
    let totalSeconds = 15 * 60;
    let people = 3;

    function updateTopStatus() {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent =
        seconds.toString().padStart(2, "0");

      if (totalSeconds > 0) totalSeconds--;
    }

    function updatePeople() {
      if (people > 1 && Math.random() < 0.25) {
        people--;
        document.getElementById("people").textContent = people;
      }
    }

    updateTopStatus();
    setInterval(updateTopStatus, 1000);
    setInterval(updatePeople, 5000);
  </script>
</body>
</html>
