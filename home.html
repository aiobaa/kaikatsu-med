<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快活クラブ オンライン診療（ご自宅）</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 420px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .btn {
      display: block;
      margin: 20px auto;
      padding: 15px;
      font-size: 18px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
    .note {
      font-size: 12px;
      color: #666;
      margin-top: 15px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>快活クラブ<br>オンライン診療</h1>

  <div class="desc">
    ご自宅からもオンライン診療をご利用いただけます。<br>
    スマートフォンまたはパソコンから受診可能です。
  </div>

  <a class="btn" href="/start">診療を開始する</a>

  <div class="note">
    ※診療開始時間は目安です<br>
    ※混雑状況により前後する場合があります
  </div>
</div>

</body>
</html>
