<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受付完了</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }
    .box {
      background: #fff;
      padding: 32px 24px;
      border-radius: 12px;
      max-width: 420px;
      margin: 40px auto;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      line-height: 1.6;
      margin: 8px 0;
    }
    .status {
      background: #eef6ff;
      border-radius: 10px;
      padding: 18px;
      margin: 22px 0;
    }
    .label {
      font-size: 14px;
      color: #666;
    }
    .time {
      font-size: 40px;
      font-weight: bold;
      color: #007bff;
      margin: 10px 0;
    }
    .people {
      font-size: 18px;
      color: #333;
    }
    .note {
      font-size: 13px;
      color: #666;
      margin-top: 18px;
      line-height: 1.7;
    }
    .next-box {
      display: none;
      margin-top: 22px;
      padding: 18px;
      background: #f7fbff;
      border: 1px solid #d7e8ff;
      border-radius: 10px;
    }
    .next-title {
      font-size: 20px;
      font-weight: bold;
      color: #007bff;
      margin-bottom: 10px;
    }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 20px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
    .audio-note {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>受付完了</h1>
    <p>受付を受け付けました。順番にご案内します。</p>

    <div class="status" id="waitingBox">
      <div class="label">あなたの診療開始目安</div>
      <div class="time">
        <span id="minutes">14</span>:<span id="seconds">30</span>
      </div>
      <div class="people">あと <span id="people">2</span> 人</div>
    </div>

    <p id="waitingText">このままお待ちください</p>

    <div class="next-box" id="nextBox">
      <div class="next-title">まもなく診療が始まります</div>
      <p>次の画面へ進んでください。</p>
      <a class="btn" href="#">診療画面へ進む</a>
    </div>

    <div class="note">
      ※診療開始時間は目安です。<br>
      混雑状況や診療内容により前後する場合があります。
    </div>

    <div class="note">
      ※順番が近づくと、画面が自動的に切り替わります。
    </div>

    <div class="audio-note">
      ※音声案内が流れます
    </div>
  </div>

  <script>
    let totalSeconds = 14 * 60 + 30;
    let people = 2;

    let announcedStart = false;
    let announcedOneMinute = false;
    let announcedTenSeconds = false;
    let shownNextBox = false;

    function speak(text) {
      if (!("speechSynthesis" in window)) return;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "ja-JP";
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 0.9;

      window.speechSynthesis.speak(utterance);
    }

    function updatePersonalStatus() {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent =
        seconds.toString().padStart(2, "0");

      if (!announcedStart) {
        speak("受付が完了しました。このままお待ちください。");
        announcedStart = true;
      }

      if (totalSeconds <= 60 && !announcedOneMinute) {
        speak("まもなく診療が始まります。画面をご確認ください。");
        announcedOneMinute = true;
      }

      if (totalSeconds <= 10 && !announcedTenSeconds) {
        speak("診療開始が近づいています。ご準備ください。");
        announcedTenSeconds = true;
      }

      if (totalSeconds <= 30 && !shownNextBox) {
        document.getElementById("nextBox").style.display = "block";
        shownNextBox = true;
      }

      if (totalSeconds > 0) {
        totalSeconds--;
      }
    }

    function updatePeople() {
      if (people > 0 && Math.random() < 0.3) {
        people--;
        document.getElementById("people").textContent = people;
      }
    }

    updatePersonalStatus();
    setInterval(updatePersonalStatus, 1000);
    setInterval(updatePeople, 6000);
  </script>
</body>
</html>
