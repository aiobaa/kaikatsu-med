<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オンライン診療 接続中</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }
    .box {
      background: #fff;
      padding: 32px 24px;
      border-radius: 12px;
      max-width: 420px;
      margin: 40px auto;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      line-height: 1.6;
    }
    .spinner {
      width: 56px;
      height: 56px;
      margin: 24px auto;
      border: 6px solid #ddd;
      border-top: 6px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .count {
      font-size: 40px;
      font-weight: bold;
      color: #007bff;
      margin: 20px 0 8px;
    }
    .note {
      font-size: 13px;
      color: #666;
      margin-top: 20px;
    }
    .hidden {
      display: none;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 24px;
      font-size: 17px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="box" id="step1">
    <h1>オンライン診療に接続中...</h1>
    <p>医療機関へ接続しています。<br>そのままお待ちください。</p>
    <div class="spinner"></div>
    <div class="count"><span id="count">3</span></div>
    <p>秒後に次の画面へ進みます</p>
    <p class="note">※デモ画面です</p>
  </div>

  <div class="box hidden" id="step2">
    <h1>接続準備が整いました</h1>
    <p>スタッフがまもなくご案内します。<br>この画面のままお待ちください。</p>
    <a class="btn" href="/">トップへ戻る</a>
    <p class="note">※デモ画面です</p>
  </div>

  <script>
    let remaining = 3;
    const countEl = document.getElementById("count");

    const timer = setInterval(() => {
      remaining -= 1;

      if (remaining <= 0) {
        clearInterval(timer);
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("step2").classList.remove("hidden");
      } else {
        countEl.textContent = remaining;
      }
    }, 1000);
  </script>
</body>
</html>
