<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受付完了（デモ）</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }
    .box {
      background: #fff;
      padding: 32px 24px;
      border-radius: 12px;
      max-width: 420px;
      margin: 40px auto;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      line-height: 1.6;
      margin: 8px 0;
    }
    .status {
      background: #eef6ff;
      border-radius: 10px;
      padding: 18px;
      margin: 22px 0;
    }
    .label {
      font-size: 14px;
      color: #666;
    }
    .time {
      font-size: 42px;
      font-weight: bold;
      color: #007bff;
      margin: 10px 0;
    }
    .people {
      font-size: 18px;
      color: #333;
    }
    .note {
      font-size: 13px;
      color: #666;
      margin-top: 18px;
      line-height: 1.7;
    }
    .next-box {
      display: none;
      margin-top: 22px;
      padding: 18px;
      background: #f7fbff;
      border: 1px solid #d7e8ff;
      border-radius: 10px;
    }
    .next-title {
      font-size: 20px;
      font-weight: bold;
      color: #007bff;
      margin-bottom: 10px;
    }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 20px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      border: none;
    }
    .start-audio {
      margin-top: 12px;
      padding: 12px 20px;
      font-size: 16px;
      background: #28a745;
      color: white;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>受付完了</h1>
    <p>受付を受け付けました。順番にご案内します。</p>

    <button class="start-audio" id="audioBtn">音声案内を開始</button>

    <div class="status">
      <div class="label">あなたの診療開始目安（デモ）</div>
      <div class="time">
        <span id="minutes">0</span>:<span id="seconds">30</span>
      </div>
      <div class="people">あと <span id="people">2</span> 人</div>
    </div>

    <p>このままお待ちください</p>

    <div class="next-box" id="nextBox">
      <div class="next-title">まもなく診療が始まります</div>
      <p>次の画面へ進んでください。</p>
      <a class="btn" href="#">診療画面へ進む</a>
    </div>

    <div class="note">
      ※デモのため短縮表示しています（実際は数分〜十数分程度）
    </div>

    <div class="note">
      ※診療開始時間は目安です。混雑状況により前後します
    </div>
  </div>

  <script>
    let totalSeconds = 30;
    let people = 2;

    let audioEnabled = false;
    let announcedStart = false;
    let announcedMid = false;
    let announcedEnd = false;

    function speak(text) {
      if (!audioEnabled) return;
      if (!("speechSynthesis" in window)) return;

      window.speechSynthesis.cancel();

      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      u.rate = 1.0;
      u.pitch = 1.0;
      u.volume = 1.0;
      window.speechSynthesis.speak(u);
    }

    document.getElementById("audioBtn").addEventListener("click", () => {
      audioEnabled = true;
      speak("受付が完了しました。このままお待ちください。");
      document.getElementById("audioBtn").textContent = "音声案内を開始しました";
      document.getElementById("audioBtn").disabled = true;
    });

    function update() {
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;

      document.getElementById("minutes").textContent = m;
      document.getElementById("seconds").textContent =
        s.toString().padStart(2, "0");

      if (audioEnabled && !announcedStart) {
        announcedStart = true;
      }

      if (totalSeconds === 15 && !announcedMid) {
        speak("まもなく診療が始まります。画面をご確認ください。");
        announcedMid = true;
      }

      if (totalSeconds === 5 && !announcedEnd) {
        speak("診療開始が近づいています。ご準備ください。");
        announcedEnd = true;
      }

      if (totalSeconds <= 5) {
        document.getElementById("nextBox").style.display = "block";
      }

      if (totalSeconds > 0) totalSeconds--;
    }

    function updatePeople() {
      if (people > 0 && Math.random() < 0.4) {
        people--;
        document.getElementById("people").textContent = people;
      }
    }

    update();
    setInterval(update, 1000);
    setInterval(updatePeople, 4000);
  </script>
</body>
</html>
