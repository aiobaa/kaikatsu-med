<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受付完了</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }
    .box {
      background: #fff;
      padding: 32px 24px;
      border-radius: 12px;
      max-width: 420px;
      margin: 40px auto;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      line-height: 1.6;
    }
    .status {
      background: #eef6ff;
      border-radius: 10px;
      padding: 18px;
      margin: 22px 0;
    }
    .time {
      font-size: 40px;
      font-weight: bold;
      color: #007bff;
      margin: 10px 0;
    }
    .people {
      font-size: 18px;
      color: #333;
    }
    .note {
      font-size: 13px;
      color: #666;
      margin-top: 18px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 24px;
      font-size: 17px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>受付完了</h1>
    <p>受付を受け付けました。<br>順番にご案内します。</p>

    <div class="status">
      <div>あなたの診療開始目安</div>
      <div class="time"><span id="minutes">14</span>:<span id="seconds">30</span></div>
      <div class="people">あと <span id="people">2</span> 人</div>
    </div>

    <p>このままお待ちください</p>

    <a class="btn" href="/">トップへ戻る</a>

    <p class="note">※実証実験用デモです</p>
  </div>

  <script>
    let totalSeconds = 14 * 60 + 30;
    let people = 2;

    function updatePersonalStatus() {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent =
        seconds.toString().padStart(2, "0");

      if (totalSeconds > 0) {
        totalSeconds--;
      }
    }

    function updatePeople() {
      if (people > 0 && Math.random() < 0.3) {
        people--;
        document.getElementById("people").textContent = people;
      }
    }

    updatePersonalStatus();
    setInterval(updatePersonalStatus, 1000);
    setInterval(updatePeople, 6000);
  </script>
</body>
</html>
