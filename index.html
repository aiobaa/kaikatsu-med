<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>快活クラブ オンライン診療</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 30px 24px;
      border-radius: 12px;
      max-width: 420px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    .time-box {
      background: #eef6ff;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
    }
    .time-label {
      font-size: 14px;
      color: #666;
    }
    .time-value {
      font-size: 40px;
      font-weight: bold;
      color: #007bff;
      margin: 10px 0;
    }
    .btn {
      display: block;
      margin: 20px auto;
      padding: 15px;
      font-size: 18px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
    .sub {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>快活クラブ<br>オンライン診療</h1>

    <div class="time-box">
      <div class="time-label">最短待ち時間</div>
      <div class="time-value">
        <span id="minutes">15</span>:<span id="seconds">00</span>
      </div>
      <div class="sub">順番にご案内しています</div>
    </div>

    <a class="btn" href="/start">診療を開始する</a>

    <div class="sub">
      ※スタッフがご案内します<br>
      ※実証実験用デモです
    </div>

    <div style="margin-top:20px;font-size:12px;">
      <a href="/admin">管理画面（スタッフ用）</a>
    </div>
  </div>

  <script>
    let totalSeconds = 15 * 60; // 15分

    function updateTimer() {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent =
        seconds.toString().padStart(2, "0");

      if (totalSeconds > 0) {
        totalSeconds--;
      }
    }

    setInterval(updateTimer, 1000);
  </script>

</body>
</html>
