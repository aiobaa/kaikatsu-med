<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>快活クラブ オンライン診療</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }
    .box {
      background: white;
      padding: 30px 24px;
      border-radius: 12px;
      max-width: 420px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .lead {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    .status-box {
      background: #eef6ff;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
    }
    .label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .time {
      font-size: 40px;
      font-weight: bold;
      color: #007bff;
      margin: 8px 0;
    }
    .people {
      font-size: 18px;
      color: #333;
      margin-top: 8px;
    }
    .btn {
      display: block;
      margin: 24px auto 14px;
      padding: 15px;
      font-size: 18px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
    .sub {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
      line-height: 1.6;
    }
    .staff-link {
      margin-top: 22px;
      font-size: 12px;
    }
    .staff-link a {
      color: #666;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>快活クラブ<br>オンライン診療</h1>

    <div class="lead">
      個室からオンラインで医師につながる診療導線のデモです
    </div>

    <div class="status-box">
      <div class="label">現在の待ち時間</div>
      <div class="time">
        <span id="minutes">15</span>:<span id="seconds">00</span>
      </div>
      <div class="people">あと <span id="people">3</span> 人待ち</div>
    </div>

    <a class="btn" href="/start">受付する</a>

    <div class="sub">
      待ち時間と待ち人数をご確認のうえ、受付してください<br>
      ※実証実験用デモです
    </div>

    <div class="staff-link">
      <a href="/admin">管理画面（スタッフ用）</a>
    </div>
  </div>

  <script>
    let totalSeconds = 15 * 60;
    let people = 3;

    function updateTopStatus() {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent =
        seconds.toString().padStart(2, "0");

      if (totalSeconds > 0) {
        totalSeconds--;
      }
    }

    function updatePeople() {
      if (people > 1 && Math.random() < 0.25) {
        people--;
        document.getElementById("people").textContent = people;
      }
    }

    updateTopStatus();
    setInterval(updateTopStatus, 1000);
    setInterval(updatePeople, 5000);
  </script>

</body>
</html>
